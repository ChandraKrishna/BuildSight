{% load static %}
<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sign in · BuildSight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'core/app.css' %}" rel="stylesheet">
</head>

<body class="login-page">
    <section class="login-card">
        <div class="brand mb-4">◈ BuildSight</div><span class="eyebrow">JENKINS + GITHUB</span>
        <h1>Welcome back</h1>
        <p>Sign in to monitor every build that matters.</p>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}
            <button class="btn btn-primary w-100">Sign in <span>→</span></button>
        </form>
    </section>
</body>

</html>
